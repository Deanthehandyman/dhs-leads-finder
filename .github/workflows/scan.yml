name: Dean's Lead Scanner

on:
  schedule:
    - cron: '*/30 * * * *'   # Scan every 30 min 24/7
    - cron: '0 13 * * *'     # Daily digest at 8am Central (13:00 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scan or digest'
        default: 'scan'

jobs:
  scan:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run lead scanner
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_PHONE:       ${{ secrets.NOTIFY_PHONE }}
          NOTIFY_CARRIER:     ${{ secrets.NOTIFY_CARRIER }}
          RUN_MODE:           scan
        run: node scanner.js
      - name: Commit leads
        run: |
          git config user.name "Lead Bot"
          git config user.email "bot@deanshandymanservice.me"
          git add leads.json
          git diff --staged --quiet || git commit -m "🔍 Scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  daily-digest:
    if: github.event.schedule == '0 13 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Send daily digest
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_PHONE:       ${{ secrets.NOTIFY_PHONE }}
          NOTIFY_CARRIER:     ${{ secrets.NOTIFY_CARRIER }}
          RUN_MODE:           digest
        run: node scanner.js
