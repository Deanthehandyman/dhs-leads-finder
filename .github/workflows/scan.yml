name: Starlink Lead Scanner

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lead scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_PHONE:      ${{ secrets.NOTIFY_PHONE }}
          NOTIFY_CARRIER:    ${{ secrets.NOTIFY_CARRIER }}
        run: node scanner.js

      - name: Commit updated leads
        run: |
          git config user.name  "Lead Bot"
          git config user.email "bot@deanshandymanservice.me"
          git add leads.json
          git diff --staged --quiet || git commit -m "Auto-scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
