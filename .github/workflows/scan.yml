name: Dean's Lead Scanner

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'scan = find leads | digest = send email | test = send test email'
        default: 'scan'

jobs:
  scan:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      
      - name: Run lead scanner
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }} # 🔥 FIXED: Bot can now see the Google Sheet
          RUN_MODE: ${{ github.event.inputs.mode || 'scan' }}
        run: node scanner.js
        
      - name: Commit leads
        run: |
          git config user.name "Lead Bot"
          git config user.email "bot@deanshandymanservice.me"
          # Create files if they don't exist so it doesn't crash
          test -f replied.json || echo "[]" > replied.json
          test -f seen.json || echo "[]" > seen.json
          # 🔥 FIXED: Now saving the Vault (seen.json) so old leads don't return!
          git add leads.json replied.json seen.json
          git diff --staged --quiet || git commit -m "🔍 Scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main # 🔥 FIXED: Forces the push to your main branch

  daily-digest:
    if: github.event.schedule == '0 13 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Send daily digest
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          RUN_MODE: digest
        run: node scanner.js
